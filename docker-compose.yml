services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host-side port is configurable (default 5433) so we don't clash with a
    # local Postgres on 5432. Inside the compose network services still reach
    # it at postgres:5432.
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Same pattern: expose on a non-default host port by default.
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  seed:
    build:
      context: ./seed
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      SEED_TICKERS: ${SEED_TICKERS}
      SEED_BENCHMARK: ${SEED_BENCHMARK}
      SEED_START_DATE: ${SEED_START_DATE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./api
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_LOG_LEVEL: ${API_LOG_LEVEL}
      API_CACHE_TTL_SECONDS: ${API_CACHE_TTL_SECONDS}
    ports:
      - "${API_HOST_PORT:-8088}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
    environment:
      API_BASE_URL: http://api:8000
      DASH_HOST: 0.0.0.0
      DASH_PORT: 8050
      DASH_DEBUG: ${DASH_DEBUG}
    ports:
      - "${DASH_HOST_PORT:-8050}:8050"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
