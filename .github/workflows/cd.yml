name: cd

# Runs after CI succeeds on main. Ships the repo to the production server
# over SSH, writes secrets into an .env file owned by root on the server
# (never committed), builds the images on the server, and rolls the stack.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    # Only deploy if the upstream CI run was green.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://dashdemo.therealsoftware.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rsync repo to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '.env' \
            --exclude 'pgdata' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:/opt/dashdemo-therealsoftware/app/"

      - name: Write .env on server from secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_RO_PASSWORD: ${{ secrets.POSTGRES_RO_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Build the .env content locally, then scp it. A heredoc over
          # ssh would leak values through the process table; scp of a
          # tmpfile is cleaner.
          TMP=$(mktemp)
          cat > "$TMP" <<EOF
          # Written by .github/workflows/cd.yml. Do not edit by hand.
          POSTGRES_USER=gam
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=gam
          POSTGRES_RO_USER=gam_ro
          POSTGRES_RO_PASSWORD=$POSTGRES_RO_PASSWORD

          API_LOG_LEVEL=INFO
          API_CACHE_TTL_SECONDS=300

          SEED_TICKERS=AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,BRK-B,JPM,V,JNJ,WMT,PG,XOM,UNH,HD,MA,BAC,PFE,KO,PEP,CVX,MRK,ABBV,CSCO,TMO,ORCL,ADBE,CRM,NFLX
          SEED_BENCHMARK=SPY
          SEED_START_DATE=2022-01-01

          GROQ_API_KEY=$GROQ_API_KEY
          GROQ_MODEL=llama-3.3-70b-versatile
          GROQ_BASE_URL=https://api.groq.com/openai/v1
          EOF

          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "$TMP" "$DEPLOY_USER@$DEPLOY_HOST:/opt/dashdemo-therealsoftware/.env"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" "chmod 600 /opt/dashdemo-therealsoftware/.env"
          rm -f "$TMP"

      - name: Build + roll the stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" <<'REMOTE'
          set -euo pipefail
          cd /opt/dashdemo-therealsoftware

          # Traefik's external 'web' and 'internal' networks are shared
          # with other services on this host; create if missing.
          docker network inspect web      >/dev/null 2>&1 || docker network create web
          docker network inspect internal >/dev/null 2>&1 || docker network create internal

          docker compose \
            -p dashdemo \
            --env-file .env \
            -f app/docker-compose.prod.yml \
            up -d --build --remove-orphans

          # Show where we ended up.
          docker compose -p dashdemo -f app/docker-compose.prod.yml ps
          REMOTE

      - name: Wait for public URL
        run: |
          echo "Waiting for https://dashdemo.therealsoftware.com ..."
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://dashdemo.therealsoftware.com/ || true)
            if [ "$code" = "200" ]; then
              echo "OK at attempt $i (HTTP $code)"
              exit 0
            fi
            echo "attempt $i: HTTP $code — retrying"
            sleep 10
          done
          echo "Did not become healthy in time. Tailing server-side logs:"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker compose -p dashdemo -f /opt/dashdemo-therealsoftware/app/docker-compose.prod.yml logs --tail=80 dashboard api"
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy"
            echo "- URL: https://dashdemo.therealsoftware.com"
            echo "- Git SHA: \`$GITHUB_SHA\`"
            echo "- Triggered by: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
